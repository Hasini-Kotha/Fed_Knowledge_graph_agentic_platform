# Knowledge Graph Configuration — credit-card-3 (no Time column)
kg:
  name: "fraud_detection_kg_2023"
  version: "1.0.0"
  domain: "fraud_detection"

  entities:
    - type: "transaction"
      id_prefix: "txn_"
      attributes:
        - column: "Amount"
          attr_name: "amount"
      label_column: "Class"
      risk_score_attr: "risk_score"

    - type: "amount_bucket"
      derived: true
      bucket_column: "Amount"
      bucket_edges: [0, 50, 200, 1000, 5000, 999999]
      bucket_labels: ["micro", "small", "medium", "large", "whale"]

  relationships:
    - type: "HAS_AMOUNT_BUCKET"
      source_entity: "transaction"
      target_entity: "amount_bucket"

    - type: "SIMILAR_PATTERN"
      source_entity: "transaction"
      target_entity: "transaction"
      similarity_features: ["V1", "V2", "V3", "V14", "V17"]
      similarity_threshold: 0.85
      top_k_neighbors: 10
      batch_size: 500

  risk:
    high_risk_threshold: 0.7
    medium_risk_threshold: 0.4
    propagation_method: "neighbor_average"
    propagation_hops: 2

  analytics:
    community_detection: "louvain"
    centrality_metric: "degree"
    top_k_suspicious: 50

  output:
    graph_format: "graphml"
    artifacts_dir: "artifacts/knowledge_graph_2023"
