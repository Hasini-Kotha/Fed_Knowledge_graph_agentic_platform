"""Data Configuration (duplicate of configs/data_config.yaml)."""
data:
  source: "kaggle"
  data_dir: "Sample_datasets"
  dataset_file: "credit-card-1/creditcard.csv"
  mapping_path: "configs/mapping.json"

split:
  num_clients: 3
  test_ratio: 0.15
  val_ratio: 0.20
  random_seed: 42
  non_iid: false
  sort_by: null
  output_dir: "data/splits"
  prefix: ""

vectorizer:
  vector_size: 128
  scaler_type: "standard"

columns:
  label_column: "Class"
  label_positive: 1
  label_negative: 0